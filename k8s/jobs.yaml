apiVersion: batch/v1
kind: CronJob
metadata:
  name: model-retraining
  namespace: default
spec:
  schedule: "0 2 * * 0"  # Every Sunday at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: model-retraining
          containers:
          - name: retrain
            image: heart-disease-api:v2.0.0
            command: ["python", "src/retrain.py"]
            volumeMounts:
            - name: data
              mountPath: /app/data
            - name: models
              mountPath: /app/models
            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"
              limits:
                memory: "1Gi"
                cpu: "1000m"
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: data-pvc
          - name: models
            persistentVolumeClaim:
              claimName: models-pvc
          restartPolicy: OnFailure
          backoffLimit: 3
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: drift-detection
  namespace: default
spec:
  schedule: "0 * * * *"  # Every hour
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: drift-check
            image: heart-disease-api:v2.0.0
            command: ["python", "-c", "from src.drift_detection import get_drift_summary; import json; print(json.dumps(get_drift_summary(), indent=2))"]
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          restartPolicy: OnFailure
          backoffLimit: 2
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-retraining
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: model-retraining
  namespace: default
rules:
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-retraining
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: model-retraining
subjects:
- kind: ServiceAccount
  name: model-retraining
  namespace: default
