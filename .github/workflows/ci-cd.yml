name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: your-username/heart-disease-api
  PYTHON_VERSION: 3.11

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test & Quality Checks
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        flake8 app/ src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Format check with black
      run: |
        black --check app/ src/ tests/ || true
    
    - name: Unit tests
      run: |
        pytest tests/ -v --cov=app --cov=src --cov-report=xml --cov-report=term
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
    
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  retrain:
    runs-on: ubuntu-latest
    name: Model Retraining & Drift Detection
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run drift detection
      run: |
        python -c "
        from src.drift_detection import get_drift_summary
        import json
        summary = get_drift_summary()
        print(json.dumps(summary, indent=2))
        if summary.get('drifted_in_recent'):
          print('⚠️  Model drift detected!')
        "
    
    - name: Run model retraining
      run: |
        python src/retrain.py
      continue-on-error: true
    
    - name: Upload model registry
      uses: actions/upload-artifact@v3
      with:
        name: model-registry
        path: models/model_registry.json

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Kubernetes
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.27.0'
    
    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    - name: Deploy to K8s
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/monitoring.yaml
        kubectl apply -f k8s/jobs.yaml
        kubectl rollout status deployment/heart-disease-api -n default --timeout=5m
    
    - name: Verify deployment
      run: |
        kubectl get pods -n default
        kubectl get services -n default
        kubectl describe deployment heart-disease-api -n default

  load-test:
    runs-on: ubuntu-latest
    name: Load Testing
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install locust
    
    - name: Get service endpoint
      run: |
        kubectl get services heart-disease-api -n default
    
    - name: Run load test
      run: |
        locust -f tests/locustfile.py --headless -u 50 -r 10 -t 2m --host=http://localhost:8000 || true
      continue-on-error: true
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: load-test-results
        path: ./

  notify:
    runs-on: ubuntu-latest
    name: Notify Deployment Status
    needs: [deploy, load-test]
    if: always()
    
    steps:
    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "Heart Disease API CI/CD Pipeline",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "Deployment Status: ${{ job.status }}\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}"
                }
              }
            ]
          }
      if: always()
